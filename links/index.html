<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Weekend Loaf</title>
    <link rel="icon" type="image/x-icon" href="../images/logo.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Replace this with your own, this appears in search results and when sharing.">

    <!-- Keywords -->
    <meta name="keywords" content="your name, industry, and specialties">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://satishkn.github.io/WeekendLoaf">

    <!-- Author Information -->
    <meta name="author" content="Your Name">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="../images/logo.png" srcset="../images/logo.png 2x" alt="Weekend Loaf">

            <!-- Replace with your name or brand -->
            <h1>
              <div>Weekend Loaf</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Bold flavored bakes and snacks. Perfect for gifting too.</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">



      
              

              <!-- Instagram -->
              <a class="button button-instagram" href="https://www.instagram.com/WeekendLoaf.ATX" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Follow us on Instagram</a>

              <!-- Whatsapp Catalog -->
              <a class="button button-whatsapp" href="https://wa.me/c/17374248647" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/whatsapp.svg" alt="WhatsApp Logo">WhatsApp Catalog</a>

              <!-- Google review -->
              <a class="button button-kick-alt" href="https://g.page/r/Cau682bpRZY3EBM/review" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/kick-alt.svg" alt="Submit Review">Submit a review on Google</a>

              <!-- Venmo -->
              <a class="button button-venmo" href="https://link.venmo.com/send-request-money?txn=pay&recipients=WeekendLoaf&referrer=biz_charge_sheet_payment_link" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/venmo.svg" alt="Venmo Logo">Pay on Venmo app securely</a>

              <!-- Generic SMS -->
              <a class="button button-default" href="sms:+17374248647?body=I%20Interested%20to%20know%20about%20monthly%20giveaway"target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-sms.svg" alt="SMS Icon">Monthly Giveaway</a>

              <!-- Generic Website -->
              <a class="button button-default" href="https://bakery.weekendloaf.workers.dev/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Website Icon">Visit Website</a>


      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a>  <a href="https://bakery.weekendloaf.workers.dev/" target="_blank" rel="noopener">Weekend Loaf</a>
      </footer>

    </div>
  </div>

</body>

</html>
